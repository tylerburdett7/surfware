<div id="ballast-overlay" class="ballast-overlay">
  <!-- Ramfill Status - Top Left (hidden until ramfill tanks are active) -->
  <div class="ramfill-status" style="display:none">
    <div>Ramfill status:</div>
    <div class="status-text"></div>
  </div>
  
  <div class="ballast-controls">
    <button class="ballast-action fill-all">▲<br>FILL ALL</button>
    <button class="ballast-action stop-all">⏹<br>STOP ALL</button>
    <button class="ballast-action drain-all">▼<br>DRAIN ALL</button>
    <div class="set-all-wrap">
      <button class="ballast-action set-all-btn" id="set-all-btn" onclick="ballastToggleSetAll()">SET ALL TO</button>
      <div class="set-all-panel" id="set-all-panel">
        <button class="set-all-adj" onmousedown="ballastSetAllStart(-1)" onmouseup="ballastSetAllStop()" onmouseleave="ballastSetAllStop()">−</button>
        <span class="set-all-pct" id="set-all-pct">0%</span>
        <button class="set-all-adj" onmousedown="ballastSetAllStart(1)" onmouseup="ballastSetAllStop()" onmouseleave="ballastSetAllStop()">+</button>
        <button class="set-all-confirm" onclick="ballastConfirmSetAll()">SET</button>
      </div>
    </div>
  </div>
  
  <!-- Trailer Mode Button - Bottom Right -->
  <button class="ballast-action trailer-mode-btn" onclick="openTrailerModePopup()">TRAILER<br>MODE</button>
  
  <!-- Trailer Mode Popup -->
  <div class="trailer-mode-popup" id="trailer-mode-popup">
    <div class="trailer-mode-popup-header">
      Trailer Mode
      <button class="trailer-mode-popup-close" onclick="closeTrailerModePopup()">×</button>
    </div>
    <div class="gate-section">
      <div class="gate-section-title">
        <span>Fill Gates</span>
        <span class="gate-status" id="fill-gates-status">closed</span>
      </div>
      <div class="gate-buttons">
        <button class="gate-button" onclick="openFillGates()">OPEN</button>
        <button class="gate-button" onclick="closeFillGates()">CLOSE</button>
      </div>
    </div>
    <div class="gate-section">
      <div class="gate-section-title">
        <span>Drain Gates</span>
        <span class="gate-status" id="drain-gates-status">closed</span>
      </div>
      <div class="gate-buttons">
        <button class="gate-button" onclick="openDrainGates()">OPEN</button>
        <button class="gate-button" onclick="closeDrainGates()">CLOSE</button>
      </div>
    </div>
  </div>
  <div class="boat-wrapper" id="boat-wrapper">
    <img src="../images/overhead-view.png" alt="Boat Top View" />
    
    <!-- Ballast zones -->
    <div class="ballast tank-bow" onclick="selectTank('Bow', event)">0</div>
    <div class="ballast tank-center" onclick="selectTank('Center', event)">0</div>
    <div class="ballast tank-ramfill-port" onclick="selectTank('Ramfill Port', event)">0</div>
    <div class="ballast tank-ramfill-stbd" onclick="selectTank('Ramfill Starboard', event)">0</div>
    <div class="ballast tank-port-pnp" onclick="selectTank('Port PNP', event)">0</div>
    <div class="ballast tank-stbd-pnp" onclick="selectTank('Starboard PNP', event)">0</div>
    <div class="ballast tank-transom" onclick="selectTank('Transom', event)">0</div>
  </div>
  <div class="tank-control-panel" id="tank-control-panel">
    <div class="tank-panel-header" id="tank-panel-name">Tank Name</div>
    <button class="tank-panel-btn fill-btn">▲ FILL</button>
    <button class="tank-panel-btn stop-btn">⏹ STOP</button>
    <button class="tank-panel-btn drain-btn">▼ DRAIN</button>
    <div class="tank-set-wrap" id="tank-set-wrap">
      <button class="tank-panel-btn tank-set-btn" id="tank-set-btn" onclick="tankToggleSetTo()">SET TO</button>
      <div class="tank-set-controls" id="tank-set-controls">
        <button class="set-all-adj tank-set-adj" onmousedown="tankSetToStart(-1)" onmouseup="tankSetToStop()" onmouseleave="tankSetToStop()">−</button>
        <span class="set-all-pct tank-set-pct" id="tank-set-pct">0%</span>
        <button class="set-all-adj tank-set-adj" onmousedown="tankSetToStart(1)" onmouseup="tankSetToStop()" onmouseleave="tankSetToStop()">+</button>
        <button class="set-all-confirm" onclick="tankConfirmSetTo()">SET</button>
      </div>
    </div>
  </div>
</div>
